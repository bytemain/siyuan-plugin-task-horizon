<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF4FA"/>
      <stop offset="1" stop-color="#F8F4EC"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFCFE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1A2B44" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 24px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #18324A; }
      .subtitle { font: 600 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #27435B; }
      .label { font: 600 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #5A728A; }
      .body { font: 500 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #294155; }
      .small { font: 500 12px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #70859A; }
      .tiny { font: 500 11px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #7E91A3; }
      .task { font: 600 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1D334A; }
      .muted { fill: #8A9BAA; }
      .chipText { font: 600 12px "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>
  <rect x="26" y="24" width="1548" height="1032" rx="28" fill="#F7FAFD" stroke="#D9E4EF"/>

  <text x="62" y="70" class="title">Task Horizon 任务详情概念图</text>
  <text x="62" y="98" class="small">方向：滴答式自建详情面板 + pinch 式递归子任务树，右侧详情区以“子任务”为主，时间与备注降为次级模块</text>

  <rect x="52" y="126" width="760" height="900" rx="24" fill="url(#panel)" stroke="#DCE6EF" filter="url(#shadow)"/>
  <rect x="840" y="126" width="708" height="900" rx="24" fill="url(#panel)" stroke="#DCE6EF" filter="url(#shadow)"/>

  <text x="84" y="168" class="subtitle">左侧任务列表</text>
  <text x="872" y="168" class="subtitle">右侧任务详情</text>

  <rect x="78" y="190" width="708" height="44" rx="14" fill="#F2F6FA" stroke="#E3EBF3"/>
  <text x="100" y="218" class="label">筛选：工作 / 按时间 / 进行中</text>

  <text x="86" y="276" class="subtitle">已过期</text>
  <rect x="86" y="296" width="692" height="72" rx="18" fill="#FFF7F3" stroke="#FFDCCF"/>
  <rect x="86" y="296" width="5" height="72" rx="3" fill="#FF875F"/>
  <circle cx="114" cy="332" r="10" fill="#FFFFFF" stroke="#E3693F" stroke-width="2"/>
  <path d="M120 332H125" stroke="#E3693F" stroke-width="2.2" stroke-linecap="round"/>
  <text x="136" y="324" class="task">【正波拉断阀 低温】</text>
  <text x="136" y="347" class="small">主任务 · 有 3 个子任务 · 风险高</text>
  <rect x="660" y="314" width="84" height="28" rx="10" fill="#FFF4BF" stroke="#F0D76D"/>
  <text x="683" y="332" class="chipText" fill="#9F7A00">有风险</text>

  <rect x="112" y="382" width="630" height="58" rx="16" fill="#FFFFFF" stroke="#E6EDF4"/>
  <line x1="136" y1="411" x2="136" y2="440" stroke="#D1DCE7" stroke-width="2"/>
  <circle cx="160" cy="412" r="9" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="182" y="417" class="body">确认试制样件尺寸</text>
  <text x="626" y="417" class="tiny">03-31</text>

  <rect x="132" y="448" width="610" height="58" rx="16" fill="#EDF6FF" stroke="#B7D8FF"/>
  <line x1="156" y1="477" x2="156" y2="506" stroke="#8AB7F0" stroke-width="2"/>
  <circle cx="180" cy="478" r="9" fill="#FFFFFF" stroke="#5D99E8" stroke-width="2"/>
  <text x="202" y="483" class="body">补充试验条件和材料批次</text>
  <rect x="642" y="464" width="58" height="26" rx="10" fill="#EAF5FF" stroke="#BED9F6"/>
  <text x="661" y="481" class="chipText" fill="#3179C7">进行</text>

  <rect x="112" y="522" width="630" height="58" rx="16" fill="#FFFFFF" stroke="#E6EDF4"/>
  <circle cx="160" cy="552" r="9" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="182" y="557" class="body">整理测试结论并同步评审</text>
  <text x="626" y="557" class="tiny">04-02</text>

  <text x="86" y="632" class="subtitle">本周</text>
  <rect x="86" y="652" width="692" height="64" rx="18" fill="#FFFFFF" stroke="#E6EDF4"/>
  <circle cx="114" cy="684" r="10" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="136" y="676" class="task">泵拆解报告 SVP60-1</text>
  <text x="136" y="699" class="small">状态、重要性、时间信息留在列表里作为摘要，不抢子任务编辑区的主视觉</text>
  <rect x="680" y="670" width="56" height="26" rx="10" fill="#EEF6FF" stroke="#C6DCF6"/>
  <text x="698" y="687" class="chipText" fill="#2A71B8">中</text>

  <text x="874" y="212" class="small">这里把详情区做成“任务工作台”，不是纯字段表单</text>

  <rect x="872" y="228" width="644" height="74" rx="18" fill="#FFFFFF" stroke="#E7EEF5"/>
  <circle cx="904" cy="265" r="13" fill="#FFFFFF" stroke="#E3693F" stroke-width="2.2"/>
  <path d="M898 265L904 271L914 259" stroke="#E3693F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="930" y="257" class="title">【正波拉断阀 低温】</text>
  <text x="930" y="283" class="small">标题区保留最大视觉权重，操作按钮只做辅助</text>
  <rect x="1418" y="244" width="68" height="42" rx="14" fill="#EEF6FF" stroke="#C9DCF2"/>
  <text x="1441" y="270" class="chipText" fill="#296CA6">跳转</text>

  <rect x="872" y="318" width="220" height="34" rx="12" fill="#F3F6FA" stroke="#E2EAF3"/>
  <text x="892" y="339" class="chipText" fill="#5E7386">📄 油气回收</text>
  <rect x="1106" y="318" width="150" height="34" rx="12" fill="#F3F6FA" stroke="#E2EAF3"/>
  <text x="1127" y="339" class="chipText" fill="#5E7386">🧩 部件导入</text>
  <rect x="1270" y="318" width="150" height="34" rx="12" fill="#FFF4BF" stroke="#F0D76D"/>
  <text x="1309" y="339" class="chipText" fill="#9F7A00">3/5 子任务</text>

  <rect x="872" y="372" width="644" height="116" rx="18" fill="#F8FBFE" stroke="#E2EAF3"/>
  <text x="896" y="402" class="label">核心控制区</text>

  <text x="896" y="438" class="small">状态</text>
  <rect x="940" y="416" width="114" height="36" rx="12" fill="#FFF4BF" stroke="#F0D76D"/>
  <text x="977" y="439" class="chipText" fill="#9F7A00">有风险</text>

  <text x="1084" y="438" class="small">重要性</text>
  <rect x="1148" y="416" width="62" height="36" rx="12" fill="#F4F6F8" stroke="#D6E0E9"/>
  <text x="1171" y="439" class="chipText" fill="#8596A4">无</text>
  <rect x="1218" y="416" width="62" height="36" rx="12" fill="#EAF4FF" stroke="#BFD7F2"/>
  <text x="1241" y="439" class="chipText" fill="#2F72BB">低</text>
  <rect x="1288" y="416" width="62" height="36" rx="12" fill="#FFF0DC" stroke="#F5C483"/>
  <text x="1311" y="439" class="chipText" fill="#D47A15">中</text>
  <rect x="1358" y="416" width="62" height="36" rx="12" fill="#FFE7E0" stroke="#F2B2A5"/>
  <text x="1381" y="439" class="chipText" fill="#C95534">高</text>

  <text x="896" y="472" class="small">置顶</text>
  <rect x="944" y="456" width="52" height="28" rx="14" fill="#DCE9F8"/>
  <circle cx="980" cy="470" r="10" fill="#4D8FE0"/>
  <text x="1012" y="474" class="tiny">不再单独占一整行，和核心控制收在一起</text>

  <rect x="872" y="508" width="644" height="246" rx="20" fill="#FFFFFF" stroke="#E2EAF3"/>
  <text x="896" y="540" class="subtitle">子任务</text>
  <text x="1464" y="540" class="small">主操作区</text>

  <rect x="896" y="558" width="596" height="40" rx="14" fill="#F5F8FB" stroke="#E3EBF3"/>
  <text x="920" y="583" class="small">+ 快速添加子任务，回车创建</text>

  <line x1="918" y1="618" x2="918" y2="732" stroke="#D0DCE7" stroke-width="2"/>

  <circle cx="938" cy="638" r="9" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="962" y="643" class="body">确认低温工况的样件编号</text>
  <rect x="1322" y="624" width="56" height="24" rx="10" fill="#EAF5FF" stroke="#BED9F6"/>
  <text x="1341" y="640" class="chipText" fill="#3179C7">进行</text>

  <circle cx="938" cy="678" r="9" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="962" y="683" class="body">补齐试验照片与视频</text>
  <rect x="1322" y="664" width="56" height="24" rx="10" fill="#F4F6F8" stroke="#D7E1E9"/>
  <text x="1341" y="680" class="chipText" fill="#80919F">待办</text>

  <line x1="952" y1="694" x2="952" y2="732" stroke="#D0DCE7" stroke-width="2"/>
  <circle cx="972" cy="716" r="8" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <text x="994" y="721" class="small">子子任务：补拍密封位置细节</text>

  <circle cx="938" cy="754" r="9" fill="#FFFFFF" stroke="#AEBFCE" stroke-width="2"/>
  <path d="M933 754L938 759L946 750" stroke="#89A4B8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="962" y="759" class="body muted">整理实验结论初稿</text>

  <text x="1188" y="733" class="tiny">这里直接吸收 pinch 的递归树样式，不嵌整页原文</text>

  <rect x="872" y="774" width="312" height="116" rx="20" fill="#FFFFFF" stroke="#E2EAF3"/>
  <text x="896" y="804" class="subtitle">时间</text>
  <text x="896" y="832" class="small">开始日期</text>
  <rect x="980" y="816" width="180" height="34" rx="12" fill="#F7FAFD" stroke="#E2EAF3"/>
  <text x="1004" y="838" class="small">2026 / 03 / 30</text>
  <text x="896" y="872" class="small">截止日期</text>
  <rect x="980" y="856" width="180" height="34" rx="12" fill="#F7FAFD" stroke="#E2EAF3"/>
  <text x="1004" y="878" class="small">2026 / 04 / 02</text>

  <rect x="1204" y="774" width="312" height="116" rx="20" fill="#FFFFFF" stroke="#E2EAF3"/>
  <text x="1228" y="804" class="subtitle">时长与备注摘要</text>
  <text x="1228" y="832" class="small">预估时长</text>
  <rect x="1312" y="816" width="176" height="34" rx="12" fill="#F7FAFD" stroke="#E2EAF3"/>
  <text x="1336" y="838" class="small">0.5 天</text>
  <text x="1228" y="872" class="tiny">备注不和子任务抢位置，只保留摘要感知</text>

  <rect x="872" y="904" width="644" height="96" rx="20" fill="#FFFFFF" stroke="#E2EAF3"/>
  <text x="896" y="934" class="subtitle">备注</text>
  <rect x="896" y="948" width="596" height="36" rx="14" fill="#F8FBFE" stroke="#E2EAF3"/>
  <text x="920" y="971" class="small">这里放测试限制、风险说明、需要谁配合。备注独立成块，和时间并列但视觉弱于子任务。</text>
</svg>
